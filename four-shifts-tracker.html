<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APB — Four Shifts Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  background: #f4f4f8;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: #12122a;
  color: white;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-wordmark {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
.header-title { font-size: 16px; font-weight: 600; color: white; }
.header-right { font-size: 12px; color: rgba(255,255,255,0.4); }

/* ── Layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Left: radar panel ── */
.radar-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 24px 20px;
  overflow: auto;
  min-width: 0;
}

/* ── Month selector ── */
.month-selector {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
}
.month-btn {
  padding: 6px 18px;
  border: 1.5px solid #d0d0e0;
  border-radius: 20px;
  background: white;
  font-size: 12px;
  font-weight: 500;
  color: #666;
  cursor: pointer;
  transition: all 0.18s;
}
.month-btn:hover { border-color: #5d5dbf; color: #5d5dbf; }
.month-btn.active {
  background: #3d3d8f;
  border-color: #3d3d8f;
  color: white;
  font-weight: 600;
}
.month-btn.future {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
  border-style: dashed;
}

/* ── Radar container ── */
.radar-wrap {
  position: relative;
  margin: 0 auto;
}

/* ── Legend ── */
.legend {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  font-size: 11px;
  color: #999;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch {
  width: 24px;
  height: 3px;
  border-radius: 2px;
}
.legend-swatch.current { background: #5d5dbf; }
.legend-swatch.prev { background: rgba(150,150,200,0.5); border-top: 2px dashed rgba(150,150,200,0.7); }

/* ── Score row ── */
.score-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  flex-wrap: wrap;
  justify-content: center;
}
.score-card {
  background: white;
  border: 1.5px solid #e4e4f0;
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.18s;
  min-width: 90px;
  text-align: center;
}
.score-card:hover { border-color: #5d5dbf; box-shadow: 0 2px 8px rgba(93,93,191,0.12); }
.score-card.selected { border-color: #3d3d8f; background: #f0f0f8; }
.score-card-key { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #aaa; margin-bottom: 4px; }
.score-card-val { font-size: 22px; font-weight: 700; color: #3d3d8f; line-height: 1; }
.score-card-delta {
  font-size: 11px;
  font-weight: 600;
  margin-top: 3px;
}
.delta-up { color: #2a8a5a; }
.delta-down { color: #aa3333; }
.delta-flat { color: #999; }

/* ── Tooltip ── */
.radar-tooltip {
  position: absolute;
  background: #12122a;
  color: white;
  padding: 5px 9px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  pointer-events: none;
  display: none;
  z-index: 20;
  white-space: nowrap;
}

/* ── Right: signals panel ── */
.signals-panel {
  width: 400px;
  min-width: 360px;
  background: white;
  border-left: 1px solid #e0e0ec;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid #eeeef5;
  background: #fafafa;
  flex-shrink: 0;
}
.panel-header-shift { font-size: 17px; font-weight: 700; color: #12122a; }
.panel-header-desc { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.4; }
.panel-header-score-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-top: 12px;
}
.panel-score-big { font-size: 32px; font-weight: 800; color: #3d3d8f; line-height: 1; }
.panel-score-delta { font-size: 14px; font-weight: 600; }
.panel-score-max { font-size: 13px; color: #ccc; }

/* ── Resource nationalism breakdown ── */
.rn-section {
  padding: 14px 22px;
  border-bottom: 1px solid #eeeef5;
  background: white;
  flex-shrink: 0;
}
.rn-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #bbb;
  margin-bottom: 12px;
}
.rn-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 9px;
}
.rn-label { font-size: 11px; color: #555; width: 148px; flex-shrink: 0; line-height: 1.3; }
.rn-bar-track { flex: 1; height: 5px; background: #eeeef5; border-radius: 3px; overflow: hidden; }
.rn-bar-fill { height: 5px; background: #5d5dbf; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.rn-bar-val { font-size: 11px; font-weight: 600; color: #5d5dbf; width: 26px; text-align: right; flex-shrink: 0; }

/* ── Signals list ── */
.signals-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
}

.signals-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #bbb;
  padding: 0 2px;
  margin-bottom: 10px;
  margin-top: 4px;
}

.signal-card {
  background: #fafafa;
  border: 1.5px solid #ebebf5;
  border-radius: 8px;
  padding: 11px 13px;
  margin-bottom: 9px;
  transition: border-color 0.18s, background 0.18s;
}
.signal-card.has-link { cursor: pointer; }
.signal-card.has-link:hover { border-color: #5d5dbf; background: #f4f4fc; }
.signal-card.has-link:hover .signal-title { color: #3d3d8f; }

.signal-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.signal-kind {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 2px 7px;
  border-radius: 3px;
}
.kind-observation { background: #eef2ff; color: #4a5abe; }
.kind-finding     { background: #edf7f2; color: #2a7a50; }
.kind-interpretation { background: #fff8ed; color: #b06818; }

.signal-date { font-size: 10px; color: #bbb; }
.signal-title { font-size: 12px; font-weight: 600; color: #12122a; margin-bottom: 5px; line-height: 1.4; }
.signal-text { font-size: 11px; color: #666; line-height: 1.55; }

.signal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 7px;
}
.signal-mechanism {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 7px;
  border-radius: 3px;
  background: #f0ebff;
  color: #6a30a8;
}
.signal-source { font-size: 10px; color: #bbb; font-style: italic; }

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #ccc;
  padding: 40px;
  text-align: center;
}
.empty-icon { font-size: 36px; margin-bottom: 14px; opacity: 0.4; }
.empty-text { font-size: 13px; color: #aaa; line-height: 1.6; }

/* ── Scrollbar ── */
.signals-scroll::-webkit-scrollbar { width: 4px; }
.signals-scroll::-webkit-scrollbar-track { background: transparent; }
.signals-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* ── Lens toggle ── */
.lens-toggle {
  display: flex;
  gap: 0;
  padding: 0 22px;
  background: #fafafa;
  border-bottom: 1px solid #eeeef5;
  flex-shrink: 0;
}
.lens-btn {
  padding: 8px 14px;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  font-size: 11px;
  font-weight: 600;
  color: #aaa;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
  margin-bottom: -1px;
}
.lens-btn:hover { color: #5d5dbf; }
.lens-btn.active { color: #3d3d8f; border-bottom-color: #3d3d8f; }

/* ── Sentiment panel ── */
.sent-heading {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #bbb; margin: 14px 0 8px;
}
.sent-divider {
  border: none; border-top: 1px solid #eeeef5; margin: 14px 0;
}
.sent-bar-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
}
.sent-bar-label {
  font-size: 11px; color: #555; width: 130px; flex-shrink: 0; line-height: 1.3;
}
.sent-bar-stacked {
  flex: 1; height: 7px; border-radius: 4px; overflow: hidden; display: flex;
}
.sent-pos { background: #2a8a5a; }
.sent-neu { background: #d4c060; }
.sent-neg { background: #c04040; }
.sent-count { font-size: 10px; color: #bbb; width: 30px; text-align: right; flex-shrink: 0; }
.sent-legend {
  display: flex; gap: 12px; margin: 6px 0 2px; font-size: 10px; color: #999; flex-wrap: wrap;
}
.sent-legend-item { display: flex; align-items: center; gap: 4px; }
.sent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sent-source-note { font-size: 10px; color: #ccc; margin-top: 4px; }
.sent-mech-clickable { cursor: pointer; border-radius: 5px; padding: 3px 4px; margin: 0 -4px 4px; transition: background 0.15s; }
.sent-mech-clickable:hover { background: #f4f4fc; }
.sent-mech-selected { background: #ededf8 !important; }
.sent-mech-arrow { font-size: 10px; color: #aaa; margin-left: 4px; }
.sent-drill-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin: 12px 0 6px; display: flex; align-items: center; gap: 6px; }
.sent-drill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Sentiment story cards */
.sent-story {
  background: #fafafa; border: 1.5px solid #ebebf5; border-radius: 8px;
  padding: 11px 13px; margin-bottom: 8px; cursor: pointer;
  transition: border-color 0.18s, background 0.18s;
}
.sent-story:hover { border-color: #5d5dbf; background: #f4f4fc; }
.sent-story:hover .sent-story-headline { color: #3d3d8f; }
.sent-story-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.sent-story-tag {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
  padding: 2px 7px; border-radius: 3px; background: #f0ebff; color: #6a30a8;
}
.sent-story-date { font-size: 10px; color: #bbb; }
.sent-story-headline { font-size: 12px; font-weight: 600; color: #12122a; margin-bottom: 4px; line-height: 1.4; }
.sent-story-summary { font-size: 11px; color: #666; line-height: 1.55; }
.sent-story-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.sent-story-source { font-size: 10px; color: #bbb; font-style: italic; }
</style>
</head>

// ================================================================
// STATE
// ================================================================
let currentMonth = "Jun 2026";
let selectedShift = null;
let panelView = 'signals';
let selectedMechanism = null;

// ================================================================
// RADAR GEOMETRY
// ================================================================
const CX = 320, CY = 285, R = 150;
const LEVELS = [25, 50, 75, 100];

function axisXY(key, r) {
  const a = shiftAngle(key) * Math.PI / 180;
  return { x: CX + r * Math.sin(a), y: CY - r * Math.cos(a) };
}

function ns(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

// ================================================================
// DRAW RADAR
// ================================================================
function drawRadar() {
  const svg = document.getElementById('radarSvg');
  svg.innerHTML = '';

  const data = SCORES[currentMonth];
  if (!data || data.vs === null) {
    const t = ns('text');
    t.setAttribute('x', CX); t.setAttribute('y', CY);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', '14');
    t.setAttribute('fill', '#bbb');
    t.textContent = 'Data not yet available';
    svg.appendChild(t);
    return;
  }

  // ── Grid polygons ──
  for (const level of LEVELS) {
    const pts = SHIFTS.map(s => {
      const p = axisXY(s.key, R * level / 100);
      return `${p.x},${p.y}`;
    }).join(' ');
    const poly = ns('polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', level === 100 ? '#c8c8dc' : '#dddde8');
    poly.setAttribute('stroke-width', level === 100 ? '1' : '1');
    svg.appendChild(poly);
  }

  // ── Axis lines ──
  for (const shift of SHIFTS) {
    const end = axisXY(shift.key, R);
    const line = ns('line');
    line.setAttribute('x1', CX); line.setAttribute('y1', CY);
    line.setAttribute('x2', end.x); line.setAttribute('y2', end.y);
    line.setAttribute('stroke', '#d0d0e0');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  }

  // ── Level labels ──
  for (const level of [25, 50, 75]) {
    const p = axisXY('vs', R * level / 100);
    const t = ns('text');
    t.setAttribute('x', p.x + 4);
    t.setAttribute('y', p.y + 4);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', '9');
    t.setAttribute('fill', '#c0c0cc');
    t.textContent = level;
    svg.appendChild(t);
  }

  // ── Previous month ghost ──
  const months = MONTHS.filter(m => !FUTURE_MONTHS.includes(m));
  const prevIdx = months.indexOf(currentMonth) - 1;
  const prevLegend = document.getElementById('prevLegendItem');
  const prevLegendLabel = document.getElementById('prevLegendLabel');

  if (prevIdx >= 0) {
    const prevMonth = months[prevIdx];
    const prevData = SCORES[prevMonth];
    const prevPts = SHIFTS.map(s => {
      const p = axisXY(s.key, R * prevData[s.key] / 100);
      return `${p.x},${p.y}`;
    }).join(' ');
    const prevPoly = ns('polygon');
    prevPoly.setAttribute('points', prevPts);
    prevPoly.setAttribute('fill', 'rgba(100,100,190,0.05)');
    prevPoly.setAttribute('stroke', 'rgba(130,130,200,0.45)');
    prevPoly.setAttribute('stroke-width', '1.5');
    prevPoly.setAttribute('stroke-dasharray', '5,3');
    svg.appendChild(prevPoly);
    if (prevLegend) { prevLegend.style.display = 'flex'; prevLegendLabel.textContent = prevMonth; }
  } else {
    if (prevLegend) prevLegend.style.display = 'none';
  }

  // ── Main data polygon ──
  const pts = SHIFTS.map(s => {
    const p = axisXY(s.key, R * data[s.key] / 100);
    return `${p.x},${p.y}`;
  }).join(' ');
  const poly = ns('polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', 'rgba(93,93,191,0.13)');
  poly.setAttribute('stroke', '#5d5dbf');
  poly.setAttribute('stroke-width', '2');
  svg.appendChild(poly);

  // ── Data nodes ──
  for (const shift of SHIFTS) {
    const p = axisXY(shift.key, R * data[shift.key] / 100);
    const sel = selectedShift === shift.key;

    // Hit area
    const hitR = 22;
    const hit = ns('circle');
    hit.setAttribute('cx', p.x); hit.setAttribute('cy', p.y);
    hit.setAttribute('r', hitR);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('cursor', 'pointer');
    hit.addEventListener('click', () => selectShift(shift.key));
    hit.addEventListener('mouseenter', e => showTip(e, shift.key, data[shift.key]));
    hit.addEventListener('mouseleave', hideTip);
    svg.appendChild(hit);

    // Outer ring when selected
    if (sel) {
      const ring = ns('circle');
      ring.setAttribute('cx', p.x); ring.setAttribute('cy', p.y);
      ring.setAttribute('r', '12');
      ring.setAttribute('fill', 'rgba(61,61,143,0.12)');
      ring.setAttribute('stroke', '#3d3d8f');
      ring.setAttribute('stroke-width', '1.5');
      svg.appendChild(ring);
    }

    const circ = ns('circle');
    circ.setAttribute('cx', p.x); circ.setAttribute('cy', p.y);
    circ.setAttribute('r', sel ? '7' : '6');
    circ.setAttribute('fill', sel ? '#3d3d8f' : '#5d5dbf');
    circ.setAttribute('stroke', 'white');
    circ.setAttribute('stroke-width', '2.5');
    circ.setAttribute('cursor', 'pointer');
    circ.addEventListener('click', () => selectShift(shift.key));
    circ.addEventListener('mouseenter', e => showTip(e, shift.key, data[shift.key]));
    circ.addEventListener('mouseleave', hideTip);
    svg.appendChild(circ);
  }

  // ── Axis labels ──
  const labelConfig = {
    vs:   { offsetX: 0,  offsetY: -28, anchor: 'middle' },
    er:   { offsetX: 28, offsetY: 0,   anchor: 'start'  },
    gitc: { offsetX: 0,  offsetY: 28,  anchor: 'middle' },
    ci:   { offsetX: -28, offsetY: 0,  anchor: 'end'    }
  };

  for (const shift of SHIFTS) {
    const edgePt = axisXY(shift.key, R);
    const cfg = labelConfig[shift.key];
    const lx = edgePt.x + cfg.offsetX;
    const ly = edgePt.y + cfg.offsetY;
    const sel = selectedShift === shift.key;

    const g = ns('g');
    g.setAttribute('cursor', 'pointer');
    g.addEventListener('click', () => selectShift(shift.key));

    const lineCount = shift.label.length;
    const lineH = 16;
    const totalH = lineCount * lineH;
    // Vertical centering: for top/bottom labels, offset from baseline
    let startDy = 0;
    if (shift.key === 'vs')   startDy = -(totalH - lineH);
    if (shift.key === 'gitc') startDy = 0;
    if (shift.key === 'er' || shift.key === 'ci') startDy = -(totalH / 2) + (lineH / 2) - 2;

    const t = ns('text');
    t.setAttribute('x', lx);
    t.setAttribute('y', ly + startDy);
    t.setAttribute('text-anchor', cfg.anchor);
    t.setAttribute('font-size', '13');
    t.setAttribute('font-weight', '600');
    t.setAttribute('fill', sel ? '#3d3d8f' : '#2a2a4a');
    t.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif');

    for (let i = 0; i < shift.label.length; i++) {
      const ts = ns('tspan');
      ts.setAttribute('x', lx);
      ts.setAttribute('dy', i === 0 ? 0 : lineH);
      ts.textContent = shift.label[i];
      t.appendChild(ts);
    }
    g.appendChild(t);
    svg.appendChild(g);
  }
}

// ================================================================
// TOOLTIP
// ================================================================
function showTip(e, key, score) {
  const names = { vs: 'Value Sovereignty', er: 'Economic Revolution', gitc: 'Gov. in Crossfire', ci: 'Civic Inflection' };
  const tip = document.getElementById('tooltip');
  tip.textContent = `${names[key]}: ${score}/100`;
  tip.style.display = 'block';
  const rect = document.getElementById('radarWrap').getBoundingClientRect();
  const svgRect = document.getElementById('radarSvg').getBoundingClientRect();
  tip.style.left = (e.clientX - svgRect.left + 12) + 'px';
  tip.style.top = (e.clientY - svgRect.top - 10) + 'px';
}
function hideTip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ================================================================
// SCORE CARDS
// ================================================================
function drawScoreCards() {
  const row = document.getElementById('scoreRow');
  const data = SCORES[currentMonth];
  if (!data || data.vs === null) { row.innerHTML = ''; return; }

  const months = MONTHS.filter(m => !FUTURE_MONTHS.includes(m));
  const prevIdx = months.indexOf(currentMonth) - 1;
  const prevData = prevIdx >= 0 ? SCORES[months[prevIdx]] : null;

  const labels = { vs: 'VS', er: 'ER', gitc: 'GitC', ci: 'CI' };

  row.innerHTML = '';
  for (const shift of SHIFTS) {
    const k = shift.key;
    const score = data[k];
    const prev = prevData ? prevData[k] : null;
    const diff = prev !== null ? score - prev : null;

    const card = document.createElement('div');
    card.className = 'score-card' + (selectedShift === k ? ' selected' : '');
    card.onclick = () => selectShift(k);

    let deltaHtml = '';
    if (diff !== null) {
      const cls = diff > 0 ? 'delta-up' : (diff < 0 ? 'delta-down' : 'delta-flat');
      const sign = diff > 0 ? '+' : '';
      deltaHtml = `<div class="score-card-delta ${cls}">${sign}${diff} vs ${months[prevIdx]}</div>`;
    }

    card.innerHTML = `
      <div class="score-card-key">${labels[k]}</div>
      <div class="score-card-val">${score}</div>
      ${deltaHtml}
    `;
    row.appendChild(card);
  }
}

// ================================================================
// SIGNALS PANEL
// ================================================================
function selectShift(key) {
  selectedShift = key;
  panelView = 'signals';
  selectedMechanism = null;
  drawRadar();
  drawScoreCards();
  renderPanel(key);
}

function setView(view) {
  panelView = view;
  selectedMechanism = null;
  renderPanel(selectedShift);
}

function setMechanism(name) {
  selectedMechanism = (selectedMechanism === name) ? null : name;
  renderPanel(selectedShift);
}

function renderPanel(key) {
  const panel = document.getElementById('signalsPanel');
  const data = SCORES[currentMonth];
  const score = data ? data[key] : null;
  const shifts_meta = SHIFTS.find(s => s.key === key);

  const months = MONTHS.filter(m => !FUTURE_MONTHS.includes(m));
  const prevIdx = months.indexOf(currentMonth) - 1;
  const prevScore = (score !== null && prevIdx >= 0) ? SCORES[months[prevIdx]][key] : null;
  const diff = (score !== null && prevScore !== null) ? score - prevScore : null;
  const diffHtml = diff !== null
    ? `<span class="panel-score-delta ${diff >= 0 ? 'delta-up' : 'delta-down'}">${diff >= 0 ? '+' : ''}${diff} vs ${months[prevIdx]}</span>`
    : '';

  const shiftDisplayName = shifts_meta.label.join(' ');
  const scoreHtml = score !== null
    ? `<div class="panel-header-score-row">
        <span class="panel-score-big">${score}</span>
        ${diffHtml}
        <span class="panel-score-max">/ 100</span>
       </div>`
    : `<div style="font-size:12px;color:#aaa;margin-top:8px;">Data pending — June report running Monday</div>`;

  // Lens toggle — VS only (sentiment data is VS / resource nationalism focused)
  const lensHtml = key === 'vs' ? `
    <div class="lens-toggle">
      <button class="lens-btn ${panelView === 'signals' ? 'active' : ''}" onclick="setView('signals')">Signals</button>
      <button class="lens-btn ${panelView === 'sentiment' ? 'active' : ''}" onclick="setView('sentiment')">Sentiment Barometer</button>
    </div>` : '';

  const contentHtml = (panelView === 'sentiment' && key === 'vs')
    ? renderSentimentContent()
    : renderSignalsContent(key, months, prevIdx);

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-header-shift">${shiftDisplayName}</div>
      <div class="panel-header-desc">${shifts_meta.desc}</div>
      ${scoreHtml}
    </div>
    ${lensHtml}
    ${contentHtml}
  `;
}

function renderSignalsContent(key, months, prevIdx) {
  // Resource nationalism bars for VS
  let rnHtml = '';
  if (key === 'vs') {
    const rn = RN_SCORES[currentMonth];
    const prevRn = prevIdx >= 0 ? RN_SCORES[months[prevIdx]] : null;
    if (rn) {
      const rows = Object.entries(rn).map(([label, val]) => {
        const prevVal = prevRn ? prevRn[label] : null;
        const d = prevVal !== null ? val - prevVal : null;
        const dHtml = d !== null
          ? `<span style="font-size:9px;font-weight:600;color:${d>0?'#2a7a50':'#aa3333'};margin-left:3px;">${d>0?'+':''}${d}</span>`
          : '';
        return `
          <div class="rn-row">
            <span class="rn-label">${label}</span>
            <div class="rn-bar-track"><div class="rn-bar-fill" style="width:${val}%"></div></div>
            <span class="rn-bar-val">${val}${dHtml}</span>
          </div>`;
      }).join('');
      rnHtml = `
        <div class="rn-section">
          <div class="rn-section-title">Resource nationalism mechanisms</div>
          ${rows}
        </div>`;
    }
  }

  const signals = (SIGNALS[currentMonth] || {})[key] || [];
  const signalCards = signals.map(s => `
    <div class="signal-card${s.url ? ' has-link' : ''}"
         ${s.url ? `onclick="window.open('${s.url}','_blank')"` : ''}>
      <div class="signal-top">
        <span class="signal-kind kind-${s.kind}">${s.kind}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="signal-date">${s.date}</span>
          ${s.url ? `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:0.35;flex-shrink:0;"><path d="M1 9L9 1M9 1H4M9 1V6" stroke="#3d3d8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
        </div>
      </div>
      <div class="signal-title">${s.title}</div>
      <div class="signal-text">${s.text}</div>
      <div class="signal-footer">
        ${s.mechanism ? `<span class="signal-mechanism">${s.mechanism}</span>` : '<span></span>'}
        <span class="signal-source">${s.source}</span>
      </div>
    </div>`).join('');

  return `
    ${rnHtml}
    <div class="signals-scroll">
      <div class="signals-section-label">${signals.length} key signals · ${currentMonth}</div>
      ${signalCards}
    </div>`;
}

function renderSentimentContent() {
  const sd = SENTIMENT_DATA;
  const linkIcon = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:0.35;flex-shrink:0;"><path d="M1 9L9 1M9 1H4M9 1V6" stroke="#3d3d8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const barRow = (label, d, labelWidth) => `
    <div class="sent-bar-row">
      <span class="sent-bar-label" style="width:${labelWidth||'130px'}">${label}</span>
      <div class="sent-bar-stacked">
        <div class="sent-pos" style="width:${d.positive}%"></div>
        <div class="sent-neu" style="width:${d.neutral}%"></div>
        <div class="sent-neg" style="width:${d.negative}%"></div>
      </div>
      <span class="sent-count">${d.mentions}</span>
    </div>`;

  // Mechanism bars — clickable if drill-down data exists
  const mechBars = sd.mechanisms.map(m => {
    const hasDrilldown = sd.storiesByMechanism && sd.storiesByMechanism[m.label];
    const isSelected = selectedMechanism === m.label;
    const arrow = hasDrilldown
      ? `<span class="sent-mech-arrow">${isSelected ? '▲' : '▼'}</span>`
      : '';
    return `
    <div class="sent-bar-row ${hasDrilldown ? 'sent-mech-clickable' : ''} ${isSelected ? 'sent-mech-selected' : ''}"
         ${hasDrilldown ? `onclick="setMechanism('${m.label}')"` : ''}>
      <span class="sent-bar-label" style="width:130px;display:flex;align-items:center;gap:2px;">${m.label}${arrow}</span>
      <div class="sent-bar-stacked">
        <div class="sent-pos" style="width:${m.positive}%"></div>
        <div class="sent-neu" style="width:${m.neutral}%"></div>
        <div class="sent-neg" style="width:${m.negative}%"></div>
      </div>
      <span class="sent-count">${m.mentions}</span>
    </div>`;
  }).join('');

  // Story card builder — with sentiment colour
  const storyCard = (s, sentiment) => {
    const colors = { positive: '#2a8a5a', neutral: '#b09020', negative: '#c04040' };
    const bgColors = { positive: '#eaf5ef', neutral: '#faf7e6', negative: '#fdeaea' };
    const labels = { positive: 'Positive', neutral: 'Neutral', negative: 'Negative' };
    const col = colors[sentiment] || '#888';
    const bg = bgColors[sentiment] || '#f5f5f5';
    const lbl = labels[sentiment] || '';
    return `
    <div class="sent-story" onclick="window.open('${s.url}','_blank')" style="border-left: 3px solid ${col};">
      <div class="sent-story-top">
        <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:2px 7px;border-radius:3px;background:${bg};color:${col};">${lbl}</span>
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="sent-story-date">${s.date}</span>
          ${linkIcon}
        </div>
      </div>
      <div class="sent-story-headline">${s.headline}</div>
      <div class="sent-story-summary">${s.summary}</div>
      <div class="sent-story-footer">
        <span class="sent-story-source">${s.source}</span>
      </div>
    </div>`;
  };

  // Default story cards (overview, all positive)
  const overviewCards = sd.stories.map(s => `
    <div class="sent-story" onclick="window.open('${s.url}','_blank')">
      <div class="sent-story-top">
        <span class="sent-story-tag">${s.tag}</span>
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="sent-story-date">${s.date}</span>
          ${linkIcon}
        </div>
      </div>
      <div class="sent-story-headline">${s.headline}</div>
      <div class="sent-story-summary">${s.summary}</div>
      <div class="sent-story-footer">
        <span class="sent-story-source">${s.source}</span>
      </div>
    </div>`).join('');

  // Drill-down cards when a mechanism is selected
  let drilldownHtml = '';
  if (selectedMechanism && sd.storiesByMechanism && sd.storiesByMechanism[selectedMechanism]) {
    const ms = sd.storiesByMechanism[selectedMechanism];
    const total = (ms.positive||[]).length + (ms.neutral||[]).length + (ms.negative||[]).length;
    drilldownHtml = `
      <div style="margin: 10px 0 6px; font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#6a6aaa;">
        ${selectedMechanism} · ${total} stories
      </div>
      ${(ms.positive||[]).map(s => storyCard(s, 'positive')).join('')}
      ${(ms.neutral||[]).map(s => storyCard(s, 'neutral')).join('')}
      ${(ms.negative||[]).map(s => storyCard(s, 'negative')).join('')}`;
  }

  const storySection = selectedMechanism && drilldownHtml
    ? drilldownHtml
    : `<div class="signals-section-label">${sd.stories.length} stories · ${sd.period}</div>${overviewCards}`;

  return `
    <div class="signals-scroll">
      <!-- Overall -->
      <div class="sent-heading">Overall sentiment towards resource nationalism</div>
      <div class="sent-bar-row">
        <span class="sent-bar-label" style="width:130px;font-weight:700;color:#3d3d8f;">${sd.overall.positive}% positive</span>
        <div class="sent-bar-stacked">
          <div class="sent-pos" style="width:${sd.overall.positive}%"></div>
          <div class="sent-neu" style="width:${sd.overall.neutral}%"></div>
          <div class="sent-neg" style="width:${sd.overall.negative}%"></div>
        </div>
        <span class="sent-count">${sd.totalMentions}</span>
      </div>
      <div class="sent-legend">
        <div class="sent-legend-item"><div class="sent-dot" style="background:#2a8a5a"></div>Positive</div>
        <div class="sent-legend-item"><div class="sent-dot" style="background:#d4c060"></div>Neutral</div>
        <div class="sent-legend-item"><div class="sent-dot" style="background:#c04040"></div>Negative</div>
      </div>
      <div class="sent-source-note">${sd.source} · ${sd.period} · media monitoring (editorial-weighted) · mentions column</div>

      <hr class="sent-divider">

      <!-- By mechanism — click to drill down -->
      <div class="sent-heading">By mechanism <span style="font-size:9px;font-weight:400;color:#bbb;text-transform:none;letter-spacing:0;">· tap to see stories</span></div>
      ${mechBars}

      <hr class="sent-divider">

      <!-- Key territories -->
      <div class="sent-heading">Key territories</div>
      ${sd.territories.map(t => barRow(t.label, t, '80px')).join('')}

      <hr class="sent-divider">

      <!-- Mining companies -->
      <div class="sent-heading">Mining companies</div>
      ${sd.companies.map(c => barRow(c.label, c, '130px')).join('')}

      <hr class="sent-divider">

      ${storySection}
    </div>`;
}

// ================================================================
// MONTH BUTTONS
// ================================================================
function buildMonthSelector() {
  const container = document.getElementById('monthSelector');
  container.innerHTML = '';
  for (const m of MONTHS) {
    const btn = document.createElement('button');
    btn.className = 'month-btn'
      + (m === currentMonth ? ' active' : '')
      + (FUTURE_MONTHS.includes(m) ? ' future' : '');
    btn.textContent = FUTURE_MONTHS.includes(m) ? m + ' (pending)' : m;
    btn.onclick = () => {
      if (FUTURE_MONTHS.includes(m)) return;
      currentMonth = m;
      buildMonthSelector();
      drawRadar();
      drawScoreCards();
      if (selectedShift) renderPanel(selectedShift);
    };
    container.appendChild(btn);
  }
}

// ================================================================
// INIT
// ================================================================
buildMonthSelector();
drawRadar();
drawScoreCards();
</script>
</body>
